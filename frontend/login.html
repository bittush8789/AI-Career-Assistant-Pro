<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Career Assistant Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass-card">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-rocket"></i> CareerAI</a>
        <div class="nav-links">
            <button class="theme-toggle" id="themeToggle"><i class="fa-solid fa-moon"></i></button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card glass-card">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Login</button>
            </form>
            <p style="margin-top: 1.5rem;">Don't have an account? <a href="register.html" style="color: var(--primary-color);">Sign up</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
