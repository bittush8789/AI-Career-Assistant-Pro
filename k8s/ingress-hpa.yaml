apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-career-ingress
  namespace: ai-career
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ai-career.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-career-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-career-hpa
  namespace: ai-career
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-career-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
