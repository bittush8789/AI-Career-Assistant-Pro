apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-career-api
  namespace: ai-career
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-career
  template:
    metadata:
      labels:
        app: ai-career
    spec:
      containers:
      - name: api
        image: bittush8789/ai-career-assistant:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: ai-career-config
        - secretRef:
            name: ai-career-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-career-service
  namespace: ai-career
spec:
  selector:
    app: ai-career
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
